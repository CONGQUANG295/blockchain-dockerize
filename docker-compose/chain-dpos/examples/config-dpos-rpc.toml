# Archive RPC node — không seal block, không unlock account.
# Peer tới validator qua reserved_peers file; bật WebSocket cho Blockscout / subscribers.

[parity]
chain = "./spec/spec.json"
base_path = "./nodes/rpc/"

[network]
port = 30301
# File chứa enode, mỗi dòng một enode (tương đương --reserved-peers=FILE)
reserved_peers = "./reserved-peers.txt"

[rpc]
cors = ["all"]
hosts = ["all"]
port = 8545
apis = ["eth", "net", "parity", "web3", "trace"]

[websockets]
disable = false
interface = "all"
port = 8546
apis = ["eth", "net", "web3"]

[footprint]
tracing = "on"
pruning = "archive"
fat_db = "on"
