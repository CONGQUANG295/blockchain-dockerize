services:
  openethereum:
    container_name: 'dpos-${NETWORK_TYPE:-testnet}-2'
    env_file:
      - ../chain-dpos/envs/openethereum.env
      - ../chain-dpos/envs/2.env
    environment:
      OE_CONFIG_PATH: /app/config/config.toml
    volumes: !override
      - ../chain-dpos/genesis/spec.json:/app/genesis/spec.json:ro
      - ../chain-dpos/nodes/2/config.toml:/app/config/config.toml:ro
      - ../chain-dpos/nodes/2/reserved-peers.txt:/app/config/reserved-peers.txt:ro
      - ../chain-dpos/nodes/2/keystore:/app/data/keys/${NETWORK_NAME}
      - ../chain-dpos/nodes/2/node.pwd:/app/secrets/node.pwd:ro
      - ../chain-dpos/nodes/2/data:/app/data
    ports: !override
      - "127.0.0.1:8545:8545"
      - "30300:30300"
      - "30300:30300/udp"
  netstats-api:
    container_name: 'dpos-${NETWORK_TYPE:-testnet}-netstats-2'
    depends_on:
      - openethereum
    env_file:
      - ../chain-dpos/envs/netstats-dashboard.env
      - ../chain-dpos/envs/netstats-api.env
    environment:
      INSTANCE_NAME: 2
      RPC_HOST: openethereum
