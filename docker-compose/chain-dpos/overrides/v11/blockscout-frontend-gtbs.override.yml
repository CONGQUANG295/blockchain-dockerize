# Optional GTBS explorer branding overlay.
# Applied automatically by deploy-explorer.sh when EXPLORER_CUSTOM_PROFILE=gtbs in deploy.env.
# Sets SKIP_ENVS_VALIDATION for custom NEXT_PUBLIC_* vars not embedded at image build time.
# Logo/icon URLs come from EXPLORER_ASSETS_BASE_URL (GitHub) — no local volume mount required.

services:
  frontend:
    environment:
      SKIP_ENVS_VALIDATION: "true"
