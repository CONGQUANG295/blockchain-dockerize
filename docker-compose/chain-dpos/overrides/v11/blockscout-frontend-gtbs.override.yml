# Optional GTBS explorer branding overlay.
# Usage (with EXPLORER_CUSTOM_PROFILE=gtbs in deploy.env):
#   docker compose -f compose-dapps-traefik-v11.yml \
#     -f overrides/v11/blockscout-frontend-gtbs.override.yml up -d

services:
  frontend:
    volumes:
      # file:///assets/configs/* (download_assets at startup) + static /assets/configs/* in browser
      - ../../assets/explorer/gtbs:/assets/configs:ro
      - ../../assets/explorer/gtbs:/app/public/assets/configs:ro
