services:
  openethereum:
    image: ${OPENETHEREUM_IMAGE:-openethereum:0.0.1}
    pull_policy: always
    container_name: openethereum
    entrypoint: entrypoints/dpos/start-validator.sh
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    expose:
      - 8545
    ports:
      - 8545:8545
      - 30300:30300
      - 30300:30300/udp
