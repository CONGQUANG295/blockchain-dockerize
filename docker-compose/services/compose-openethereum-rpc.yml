services:
  openethereum:
    image: ${OPENETHEREUM_IMAGE:-openethereum:0.0.1}
    pull_policy: always
    entrypoint: entrypoints/dpos/start-validator.sh
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    expose:
      - 8545
      - 8546
    volumes:
      - openethereum_rpc_db:/app/data

volumes:
  openethereum_rpc_db:
