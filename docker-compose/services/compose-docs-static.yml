# Static file server for docs (Traefik) or custom error pages (legacy nginx stack).
services:
  docs-static:
    image: nginx:alpine
    container_name: docs-static
    restart: unless-stopped
    volumes:
      - ../proxy_custom_html:/usr/share/nginx/html:ro
    expose:
      - 80
    networks:
      - proxy

networks:
  proxy:
    name: poa-proxy
