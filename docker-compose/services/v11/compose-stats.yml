services:
  stats-db-init:
    image: postgres:17
    volumes:
      - stats-db-data:/var/lib/postgresql/data
    entrypoint:
      - sh
      - -c
      - |
        chown -R 2000:2000 /var/lib/postgresql/data

  stats-db:
    image: postgres:17
    user: 2000:2000
    shm_size: 256m
    restart: always
    container_name: stats-db
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: ${STATS_DB_PASSWORD:-changeme}
    volumes:
      - stats-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d stats"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  stats:
    image: ${BLOCKSCOUT_STATS_IMAGE:-ghcr.io/blockscout/stats:latest}
    pull_policy: if_not_present
    platform: linux/amd64
    restart: always
    container_name: stats
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    expose:
      - 8050

volumes:
  stats-db-data:
