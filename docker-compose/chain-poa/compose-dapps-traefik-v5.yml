name: poa-dapps-traefik-v5

# POA dapps stack with Traefik + Blockscout v5 (frontend/backend split routing).
# Usage:
#   cd docker-compose/chain-poa
#   ./scripts/traefik/prepare-envs-traefik.sh
#   ./scripts/traefik/generate-dynamic-config.sh
#   docker compose -f compose-dapps-traefik-v5.yml up -d

include:
  - path:
      - ../services/compose-geth.yml
      - ./overrides/rpc.override.yml
      - ./overrides/traefik-rpc.override.yml
    env_file:
      - ./envs/poa.env
      - ./envs/traefik.env

  - path:
      - ../services/v4/compose-db.yml
      - ./overrides/v4/db.override.yml
    env_file:
      - ./envs/db.env

  - path:
      - ../services/v4/compose-blockscout.yml
      - ./overrides/v4/blockscout.override.yml
      - ./overrides/traefik-blockscout-v5.override.yml
    env_file:
      - ./envs/db.env
      - ./envs/blockscout.env
      - ./envs/traefik.env

  - path:
      - ../services/v5/compose-blockscout-frontend.yml
      - ./overrides/traefik-blockscout-v5.override.yml
    env_file:
      - ./envs/traefik.env

  - path:
      - ../services/v5/compose-blockscout-extras.yml
      - ./overrides/traefik-stats.override.yml
      - ./overrides/traefik-visualize.override.yml
    env_file:
      - ./envs/traefik.env

  - path:
      - ../services/compose-netstats-dashboard.yml
      - ./overrides/netstats-dashboard.override.yml
      - ./overrides/traefik-netstats.override.yml
    env_file:
      - ./envs/netstats-dashboard.env
      - ./envs/traefik.env

  - path:
      - ../services/compose-eth-faucet.yml
      - ./overrides/eth-faucet.override.yml
      - ./overrides/traefik-faucet.override.yml
    env_file:
      - ./envs/traefik.env

  - path:
      - ../services/compose-docs-static.yml
      - ./overrides/traefik-docs.override.yml
    env_file:
      - ./envs/traefik.env

  - path:
      - ../services/compose-traefik.yml
      - ./overrides/traefik.override.yml
    env_file:
      - ./envs/traefik.env
