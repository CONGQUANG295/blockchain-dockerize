services:
  eth-faucet:
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=poa-proxy
      - traefik.http.routers.${NETWORK_TYPE:-mainnet}-faucet.rule=Host(`${FAUCET_SERVER_NAME}`) || Host(`www.${FAUCET_SERVER_NAME}`)
      - traefik.http.routers.${NETWORK_TYPE:-mainnet}-faucet.entrypoints=websecure
      - traefik.http.routers.${NETWORK_TYPE:-mainnet}-faucet.tls.certresolver=letsencrypt
      - traefik.http.routers.${NETWORK_TYPE:-mainnet}-faucet.service=${NETWORK_TYPE:-mainnet}-faucet
      - traefik.http.routers.${NETWORK_TYPE:-mainnet}-faucet.middlewares=secure-headers@file
      - traefik.http.services.${NETWORK_TYPE:-mainnet}-faucet.loadbalancer.server.port=8080
      - traefik.http.services.${NETWORK_TYPE:-mainnet}-faucet.loadbalancer.passhostheader=true